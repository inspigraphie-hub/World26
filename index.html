<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coupe du Monde FIFA 2026</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css?v=4">
    <link rel="stylesheet" href="css/header.css?v=6">
    <link rel="stylesheet" href="css/hero.css?v=3">
    <link rel="stylesheet" href="css/cards.css?v=13">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <!-- Decors -->
    <img src="assets/bg-left.png" class="bg-left">
    <img src="assets/bg-right.png" class="bg-right">

    <!-- HEADER -->
    <header>

        <div class="logo">
            <img src="assets/logo.png">
        </div>

        <nav>
            <a href="#" class="active green">MATCHS</a>
            <a href="groups.html" class="purple">GROUPES</a>
            <a href="classement.html" class="cyan">CLASSEMENT</a>
            <a href="stats.html" class="red">STATS</a>
        </nav>

    </header>

    <div class="separator"></div>

    <!-- HERO -->
    <section class="hero reveal">

        <h2>Coupe du Monde</h2>

        <h1>FIFA 2026&trade;</h1>

        <div class="hero-image">

            <img src="assets/hero26.png" class="number26">

            <img src="assets/trophy.png" class="trophy">

        </div>

    </section>

    <section id="todaySection" class="today-section reveal">

        <div class="today-header">
            <div>
                <span class="section-kicker">&Agrave; suivre</span>
                <h2 id="todayTitle">Matchs du jour</h2>
            </div>
            <span id="todayCount" class="today-count">0 match</span>
        </div>

        <div id="todayMatches" class="today-matches"></div>

    </section>

    <section id="fanHub" class="fan-hub reveal">
        <div id="sitePulse" class="site-pulse"></div>

        <div class="fan-strip">
            <div class="fan-panel countdown-panel">
                <span class="section-kicker">Prochain match</span>
                <h2 id="nextMatchTitle">&Agrave; venir</h2>
                <div id="nextMatchCountdown" class="countdown"></div>
            </div>
        </div>

        <div class="quick-rankings">
            <div class="quick-rankings-header">
                <div>
                    <span class="section-kicker">Classements rapides</span>
                    <h2>Ce qu'il faut voir</h2>
                </div>
            </div>
            <div id="quickRankingsGrid" class="quick-rankings-grid"></div>
        </div>
    </section>

    <div class="quick-actions">
        <a href="#bracketFinal" class="quick-bracket-link">
            <i class="fa-solid fa-table-cells-large" aria-hidden="true"></i>
            <span>Voir tableau 16&egrave;mes</span>
        </a>
    </div>

    <!-- MATCHS GROUPES -->
    <section class="matches">

        <div class="matches-heading reveal">
            <h2>Matchs</h2>
            <div class="match-tools">
                <label class="team-search">
                    <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
                    <input id="teamSearch" type="search" placeholder="Rechercher une &eacute;quipe">
                </label>
                <div id="matchFilters" class="match-filters" aria-label="Filtres des matchs">
                <button class="filter-btn active" type="button" data-filter="all">Tous</button>
                <button class="filter-btn" type="button" data-filter="today">Aujourd'hui</button>
                <button class="filter-btn" type="button" data-filter="france">France</button>
                <button class="filter-btn" type="button" data-filter="upcoming">&Agrave; venir</button>
                <button class="filter-btn" type="button" data-filter="done">Termin&eacute;s</button>
                </div>
                <div id="liveScoreStatus" class="live-score-status">
                    <i class="fa-solid fa-satellite-dish" aria-hidden="true"></i>
                    <span>Scores live actifs</span>
                </div>
            </div>
        </div>

        <div id="matchesContainer"></div>

    </section>

    <!-- 16ES DE FINALE -->
   <section id="bracketFinal" class="bracket-section">

    <h2 class="reveal">Tableau final Coupe du Monde 2026</h2>

    <div id="bracketRoundNav" class="bracket-round-nav" aria-label="Navigation du tableau">
        <button type="button" data-round="round-32">16&egrave;mes</button>
        <button type="button" data-round="round-eight-finals">8&egrave;mes</button>
        <button type="button" data-round="round-quarter-finals">Quarts</button>
        <button type="button" data-round="round-semi-finals">Demi</button>
        <button type="button" data-round="round-finals">Finale</button>
    </div>

    <div class="bracket-wrapper">
        <div id="bracketContainer" class="bracket-container"></div>
    </div>

</section>

    <!-- FOOTER -->
    <footer>
        Coupe du Monde FIFA 2026 &copy;
    </footer>

    <!-- Papa Parse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.5.3/papaparse.min.js"></script>

    <script src="js/csv.js?v=10"></script>
    <script src="js/matches.js?v=7"></script>
    <script src="js/fan.js?v=8"></script>
    <script src="js/app.js"></script>

</body>

</html>
